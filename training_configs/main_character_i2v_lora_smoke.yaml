model:
  model_path: "/home/iaadmin/Comfy_models/checkpoints/ltx-2.3-22b-dev-fp8.safetensors"
  text_encoder_path: "/home/iaadmin/Comfy_models/text_encoders/gemma-local-fp8-hf"
  training_mode: "lora"
  load_checkpoint: null

lora:
  rank: 4
  alpha: 4
  dropout: 0.0
  target_modules:
    - "attn2.to_q"
    - "attn2.to_k"
    - "attn2.to_v"
    - "attn2.to_out.0"

training_strategy:
  name: "flexible"
  video:
    is_generated: true
    latents_dir: "latents"
    conditions:
      - type: first_frame
        probability: 1.0

optimization:
  learning_rate: 7e-5
  steps: 20
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw8bit"
  scheduler_type: "linear"
  scheduler_params: {}
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: "int4-quanto"
  load_text_encoder_in_8bit: true
  offload_optimizer_during_validation: true

data:
  preprocessed_data_root: "/home/iaadmin/tg_comfy_bot/character_datasets/main_character/.precomputed"
  num_dataloader_workers: 0

validation:
  samples: []
  negative_prompt: "worst quality, inconsistent face, identity drift, different person, deformed body, broken anatomy, blurry, jittery"
  video_dims: [384, 384, 17]
  frame_rate: 24.0
  seed: 42
  inference_steps: 12
  interval: null
  guidance_scale: 4.0
  stg_scale: 0.0
  stg_blocks: [29]
  stg_mode: "stg_v"
  generate_audio: false
  skip_initial_validation: true

checkpoints:
  interval: 20
  keep_last_n: 1
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: false
  project: "ltx-2-trainer"
  entity: null
  tags: ["ltx2", "lora", "character", "low-vram"]
  log_validation_videos: false

seed: 42
output_dir: "/home/iaadmin/tg_comfy_bot/character_datasets/main_character/training_smoke"
